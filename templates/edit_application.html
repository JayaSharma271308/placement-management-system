<!DOCTYPE html>
<html>
<head>
    <title>Edit Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#eef2f7;
        }

        .card{
            max-width:700px;
            margin:auto;
            margin-top:50px;
            border:none;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .form-control{
            border-radius:10px;
        }

        .btn-success{
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="card-body p-4">

        <h2 class="text-center mb-4">
            ✏️ Edit Application
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ application.name }}"
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ application.email }}"
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    value="{{ application.phone }}"
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Skills</label>
                <textarea
                    name="skills"
                    class="form-control"
                    rows="3"
                >{{ application.skills }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Cover Letter</label>
                <textarea
                    name="cover_letter"
                    class="form-control"
                    rows="4"
                >{{ application.cover_letter }}</textarea>
            </div>

            <button
                type="submit"
                class="btn btn-success w-100">
                Update Application
            </button>

        </form>

    </div>
</div>

</body>
</html>
