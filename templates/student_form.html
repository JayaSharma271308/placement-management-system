<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6ea8fe);
            min-height:100vh;
        }

        .student-card{
            margin-top:60px;
            border-radius:20px;
            border:none;
        }

        .card-header{
            border-radius:20px 20px 0 0 !important;
        }

        .form-control{
            border-radius:10px;
        }

        .btn-save{
            border-radius:10px;
            padding:10px;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg student-card">

                <div class="card-header bg-primary text-white text-center">
                    <h2>🎓 Add Student</h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Student Name</label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Enter student name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Enter email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Enter phone number">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Skills</label>
                            <input type="text"
                                   name="skills"
                                   class="form-control"
                                   placeholder="Python, Java, React">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">CGPA</label>
                            <input type="number"
                                   step="0.01"
                                   name="cgpa"
                                   class="form-control"
                                   placeholder="Enter CGPA">
                        </div>

                        <button class="btn btn-primary w-100 btn-save">
                            Save Student
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
