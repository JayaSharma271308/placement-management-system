<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Edit Job</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="title"
               value="{{ job.title }}"
               class="form-control mb-3">

        <input type="text"
               name="salary"
               value="{{ job.salary }}"
               class="form-control mb-3">

        <input type="text"
               name="eligibility"
               value="{{ job.eligibility }}"
               class="form-control mb-3">

        <button class="btn btn-primary">
            Update Job
        </button>

    </form>

</div>

</body>
</html>
