<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Add Student</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               value="{{ student.name }}"
               class="form-control mb-3"
               placeholder="Name">
               

        <input type="email"
               name="email"
               value="{{ student.email }}"
               class="form-control mb-3"
               placeholder="Email">
               

        <input type="text"
               name="phone"
               value="{{ student.phone }}"
               class="form-control mb-3"
               placeholder="Phone">
               

        <input type="text"
               name="skills"
                value="{{ student.skills }}"
               class="form-control mb-3"
               placeholder="Skills">
              

        <input type="number"
               step="0.01"
               name="cgpa"
               value="{{ student.cgpa }}"
               class="form-control mb-3"
               placeholder="CGPA">
               value="{{ student.cgpa }}"

        <button class="btn btn-primary">
            Save Student
        </button>

    </form>

</div>

</body>
</html>
