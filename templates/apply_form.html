<!DOCTYPE html>
<html>
<head>
    <title>Apply Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background: #eef2f7;
}

.card{
    border-radius: 20px;
    border: none;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
}

.form-control{
    border-radius: 12px;
    padding: 8px 12px;
    height: 45px;
}
textarea.form-control{
    height: 100px;
}

.form-control:focus{
    border-color: #0d6efd;
    box-shadow: 0px 0px 8px rgba(13,110,253,0.3);
}

.btn-success{
    border-radius: 12px;
    padding: 12px;
    font-size: 18px;
    font-weight: 600;
}

.alert-info{
    border-radius: 12px;
}
</style>
</head>
<body>

<div class="container mt-5 style="max-width:750px;">
    <div class="card shadow p-4">
    <h1 class="text-center mb-2">
    🚀 Apply for Your Dream Job
</h1>

<p class="text-center text-muted mb-4">
    Complete the form below and submit your application
</p>
<div class="alert alert-info text-center">

    <b>Company:</b> {{ job.company.company_name }}

    <br>

    <b>Job Role:</b> {{ job.title }}

</div>
    <form method="POST">

        {% csrf_token %}
       
        <input type="text"
               name="name"
               class="form-control mb-3"
               placeholder="Full Name">
        
        <input type="email"
               name="email"
               class="form-control mb-3"
               placeholder="Email">

        <input type="text"
               name="phone"
               class="form-control mb-3"
               placeholder="Phone Number">

        <textarea
            name="skills"
            class="form-control mb-3"
            placeholder="Skills"></textarea>

        <textarea
            name="cover_letter"
            class="form-control mb-3"
            placeholder="Why should we hire you?"></textarea>

        <button
       type="submit"
        class="btn btn-success w-100">

    Submit Application

</button>

    </form>
</div>
</div>

</body>
</html>
