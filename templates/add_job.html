<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#ffc107,#ff9800);
            min-height:100vh;
        }

        .job-card{
            margin-top:60px;
            border:none;
            border-radius:20px;
        }

        .card-header{
            border-radius:20px 20px 0 0 !important;
        }

        .form-control,
        .form-select{
            border-radius:10px;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:0 0 10px rgba(255,193,7,.4);
        }

        .btn-save{
            border-radius:10px;
            padding:10px;
            font-weight:600;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg job-card">

                <div class="card-header bg-warning text-dark text-center py-3">
                    <h2>💼 Add Job</h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Company
                            </label>

                            <select name="company" class="form-select">

                                {% for company in companies %}
                                <option value="{{ company.id }}">
                                    {{ company.company_name }}
                                </option>
                                {% endfor %}

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Job Title
                            </label>

                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   placeholder="Software Engineer">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Salary Package
                            </label>

                            <input type="text"
                                   name="salary"
                                   class="form-control"
                                   placeholder="8 LPA">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Eligibility (CGPA)
                            </label>

                            <input type="text"
                                   name="eligibility"
                                   class="form-control"
                                   placeholder="CGPA 7.0+">
                        </div>

                        <button class="btn btn-warning w-100 btn-save">
                            Save Job
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
