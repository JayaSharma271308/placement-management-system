<!DOCTYPE html>
<html>
<head>
    <title>Add Company</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#198754,#20c997);
            min-height:100vh;
        }

        .company-card{
            margin-top:60px;
            border:none;
            border-radius:20px;
        }

        .card-header{
            border-radius:20px 20px 0 0 !important;
        }

        .form-control{
            border-radius:10px;
        }

        .form-control:focus{
            box-shadow:0 0 10px rgba(25,135,84,.3);
        }

        .btn-save{
            border-radius:10px;
            font-weight:600;
            padding:10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg company-card">

                <div class="card-header bg-success text-white text-center py-3">
                    <h2>🏢 Add Company</h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text"
                                   name="company_name"
                                   class="form-control"
                                   placeholder="Enter Company Name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input list="cities"
                                   name="location"
                                   class="form-control"
                                   placeholder="Select Location">

                            <datalist id="cities">
                                <option value="Bangalore">
                                <option value="Pune">
                                <option value="Hyderabad">
                                <option value="Delhi">
                                <option value="Mumbai">
                            </datalist>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Website</label>
                            <input type="url"
                                   name="website"
                                   class="form-control"
                                   placeholder="https://company.com">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Package (LPA)</label>
                            <input type="text"
                                   name="package"
                                   class="form-control"
                                   placeholder="8 LPA">
                        </div>

                        <button class="btn btn-success w-100 btn-save">
                            Save Company
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
